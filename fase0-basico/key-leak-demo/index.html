<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fase 0 - Demo MPD + clave filtrada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.14.6/shaka-player.compiled.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; background: #111827; color: #e5e7eb; }
      main { max-width: 1050px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; gap: 1rem; }
      section { border: 1px solid #334155; border-radius: 8px; padding: 1rem; background: #0f172a; }
      input { width: 100%; box-sizing: border-box; padding: .55rem; margin: .25rem 0 .75rem; background: #020617; color: #93c5fd; border: 1px solid #374151; border-radius: 6px; }
      button { padding: .6rem 1rem; cursor: pointer; }
      video { width: 100%; background: #000; border-radius: 8px; }
      pre { white-space: pre-wrap; background: #020617; padding: .75rem; border-radius: 6px; min-height: 180px; }
      .ok { color: #86efac; }
      .bad { color: #fca5a5; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>MPD + clave filtrada</h1>
        <p>Demo controlada con una clave de laboratorio. No usa servidor de licencias.</p>

        <label>MPD CENC local</label>
        <input id="manifest" value="http://localhost:8080/content/dash-known-key/stream.mpd" />

        <label>KID</label>
        <input id="kid" value="1e5d4f9f3a2b4c7d8e9f001122334455" />

        <label>KEY</label>
        <input id="key" value="00112233445566778899aabbccddeeff" />

        <button id="play">Reproducir sin license server</button>
        <p id="status"></p>
      </section>

      <section>
        <video id="video" controls autoplay muted></video>
        <h3>Evidencia</h3>
        <pre id="log"></pre>
      </section>
    </main>

    <script>
      const video = document.getElementById('video');
      const player = new shaka.Player(video);
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');

      function setStatus(message, ok = true) {
        statusEl.textContent = message;
        statusEl.className = ok ? 'ok' : 'bad';
      }

      function log(data) {
        logEl.textContent = JSON.stringify(data, null, 2);
      }

      document.getElementById('play').addEventListener('click', async () => {
        const manifestUri = document.getElementById('manifest').value.trim();
        const kid = document.getElementById('kid').value.trim();
        const key = document.getElementById('key').value.trim();

        try {
          await player.unload();
          player.configure({
            drm: {
              clearKeys: {
                [kid]: key
              }
            }
          });

          await player.load(manifestUri);
          setStatus('Reproduccion iniciada sin solicitar licencia.');
          log({
            result: 'PLAYBACK_STARTED_WITH_KNOWN_KEY',
            manifestUri,
            kid,
            keySource: 'Clave de laboratorio introducida manualmente',
            licenseRequest: 'No se ha configurado servidor de licencias'
          });
        } catch (error) {
          setStatus(`Error: ${error.message}`, false);
          log({ result: 'ERROR', message: error.message, stack: error.stack });
        }
      });

      setStatus('Genera primero origin-content/dash-known-key/stream.mpd con el script de empaquetado.');
    </script>
  </body>
</html>
