services:
  cdn:
    image: varnish:7.5
    container_name: tfm-cdn-varnish
    depends_on:
      - origin
      - license-server
    ports:
      - "8080:80"
    volumes:
      - ./infra/varnish/default.vcl:/etc/varnish/default.vcl:ro
    command: ["varnishd", "-F", "-f", "/etc/varnish/default.vcl", "-a", ":80", "-s", "malloc,256m"]
    networks:
      - ott-net
    restart: unless-stopped

  origin:
    image: nginx:1.27-alpine
    container_name: tfm-origin
    ports:
      - "8081:80"
    volumes:
      - ./origin-content:/usr/share/nginx/html:ro
    networks:
      - ott-net
    restart: unless-stopped

  license-server:
    build:
      context: ./license-server
    container_name: tfm-license-server
    environment:
      - PORT=8080
      - NODE_ENV=production
    ports:
      - "8082:8080"
    networks:
      - ott-net
    restart: unless-stopped

  ott-client:
    image: nginx:1.27-alpine
    container_name: tfm-ott-client
    ports:
      - "3000:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
    networks:
      - ott-net
    restart: unless-stopped

networks:
  ott-net:
    name: tfm-ott-net
