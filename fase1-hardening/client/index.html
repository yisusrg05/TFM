<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TFM OTT Fase 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.14.6/shaka-player.compiled.min.js"></script>
    <style>
      body { margin: 0; min-height: 100vh; font-family: "Segoe UI", sans-serif; color: #e6edf7; background: #0b1320; }
      .shell { width: min(1180px, calc(100% - 32px)); margin: 24px auto; display: grid; gap: 18px; }
      .panel { background: #101c2d; border: 1px solid rgba(138,180,248,.25); border-radius: 12px; padding: 20px 24px; }
      .grid { display: grid; grid-template-columns: 360px 1fr; gap: 18px; }
      label { display: block; margin-bottom: 6px; color: #95a7bf; font-size: .9rem; }
      input { width: 100%; margin-bottom: 14px; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(138,180,248,.18); background: #07101b; color: #e6edf7; box-sizing: border-box; }
      button { width: 100%; margin-bottom: 10px; padding: 12px 16px; border: 0; border-radius: 8px; cursor: pointer; font-weight: 600; color: #08111d; background: #7cc6fe; }
      button.secondary { color: #e6edf7; background: rgba(124,198,254,.12); border: 1px solid rgba(124,198,254,.22); }
      button.danger { color: #e6edf7; background: rgba(255,123,114,.12); border: 1px solid rgba(255,123,114,.22); }
      button:disabled { opacity: .5; cursor: not-allowed; }
      .status { margin-top: 10px; padding: 12px 14px; border-radius: 8px; background: rgba(124,198,254,.08); }
      .ok { color: #7ce2a1; } .warn { color: #ffd166; } .bad { color: #ff7b72; }
      .meta { display: grid; gap: 10px; margin-top: 16px; }
      .meta div { padding: 10px 12px; border-radius: 8px; background: #07101b; }
      .meta strong { display: block; margin-bottom: 4px; color: #95a7bf; }
      .video-shell { position: relative; }
      video { width: 100%; min-height: 300px; border-radius: 10px; background: #000; }
      .watermark { position: absolute; top: 18px; right: 18px; z-index: 2; padding: 10px 14px; border-radius: 8px; background: rgba(4,10,18,.72); color: #ffe39b; font-size: .88rem; }
      pre { white-space: pre-wrap; background: #07101b; border-radius: 8px; padding: 12px; min-height: 120px; }
      @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>OTT hardening Fase 1</h1>
        <p>La licencia Widevine ya no esta expuesta como `no_auth`: solo se proxifica tras login, permiso de activo, playback session y token efimero.</p>
      </section>

      <section class="grid">
        <aside class="panel">
          <label for="email">Email</label>
          <input id="email" value="usuario-permitido@tfm.local" autocomplete="username" />
          <label for="password">Password</label>
          <input id="password" type="password" value="demo123" autocomplete="current-password" />

          <button id="btnAllowed">Login usuario con permiso</button>
          <button id="btnDenied" class="secondary">Login usuario sin permiso</button>
          <button id="btnSession" class="secondary" disabled>Crear playback session</button>
          <button id="btnPlay" class="secondary" disabled>Reproducir Widevine protegido</button>
          <button id="btnStop" class="danger" disabled>Detener sesion</button>

          <div id="status" class="status warn">Esperando login.</div>
          <div class="meta">
            <div><strong>CDN</strong><span>http://localhost:9080</span></div>
            <div><strong>Device ID</strong><span id="deviceId">-</span></div>
            <div><strong>Sesion</strong><span id="sessionId">-</span></div>
            <div><strong>MPD</strong><span id="manifestUrl">-</span></div>
            <div><strong>Licencia</strong><span>http://localhost:9080/license</span></div>
          </div>
        </aside>

        <section class="panel">
          <div class="video-shell">
            <div id="watermark" class="watermark">Sin sesion activa</div>
            <video id="video" controls autoplay muted></video>
          </div>
          <h3>Eventos</h3>
          <pre id="log"></pre>
        </section>
      </section>
    </main>

    <script>
      const API_BASE = 'http://localhost:9080';
      const state = {
        accessToken: null,
        playbackToken: null,
        sessionId: null,
        manifestUrl: null,
        heartbeatTimer: null,
        user: null,
        deviceId: localStorage.getItem('tfm-phase1-device-id') || `web-${crypto.randomUUID()}`
      };

      const player = new shaka.Player(document.getElementById('video'));
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');
      const deviceIdEl = document.getElementById('deviceId');
      const sessionIdEl = document.getElementById('sessionId');
      const manifestUrlEl = document.getElementById('manifestUrl');
      const watermarkEl = document.getElementById('watermark');

      localStorage.setItem('tfm-phase1-device-id', state.deviceId);
      deviceIdEl.textContent = state.deviceId;

      function log(data) {
        logEl.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      }

      function setStatus(message, tone = 'warn') {
        statusEl.textContent = message;
        statusEl.className = `status ${tone}`;
      }

      function setButtons() {
        document.getElementById('btnSession').disabled = !state.accessToken;
        document.getElementById('btnPlay').disabled = !state.playbackToken;
        document.getElementById('btnStop').disabled = !state.sessionId;
      }

      function configurePlayer() {
        player.configure({
          drm: {
            servers: {
              'com.widevine.alpha': `${API_BASE}/license`
            }
          }
        });
      }

      function updateWatermark() {
        if (state.user && state.sessionId) {
          const masked = state.user.email.replace(/(^.).+(@.*$)/, '$1***$2');
          watermarkEl.textContent = `${masked} | ${state.sessionId.slice(0, 8)} | F1`;
        } else {
          watermarkEl.textContent = 'Sin sesion activa';
        }
      }

      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        const requestType = shaka.net.NetworkingEngine.RequestType;
        if (type === requestType.LICENSE) {
          request.headers['Content-Type'] = 'application/octet-stream';
        }
        if (state.playbackToken && type === requestType.LICENSE) {
          request.headers.Authorization = `Bearer ${state.playbackToken}`;
          request.headers['X-Playback-Session-Id'] = state.sessionId;
          request.headers['X-Device-Id'] = state.deviceId;
          log({ type: 'LICENSE_REQUEST_PROTECTED', uri: request.uris[0], sessionId: state.sessionId });
        }
      });

      async function login(email) {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: 'demo123', deviceId: state.deviceId })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.details || data.error || 'Login failed');

        state.accessToken = data.accessToken;
        state.user = data.user;
        setButtons();
        updateWatermark();
        setStatus(`Login correcto: ${data.user.email}`, 'ok');
        log(data);
      }

      async function createSession() {
        const res = await fetch(`${API_BASE}/playback/session`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${state.accessToken}`
          },
          body: JSON.stringify({ assetId: 'sintel-widevine' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.details || data.error || 'Playback session failed');

        state.playbackToken = data.playbackToken;
        state.sessionId = data.session.sessionId;
        state.manifestUrl = data.manifestUrl;
        sessionIdEl.textContent = state.sessionId;
        manifestUrlEl.textContent = state.manifestUrl;
        configurePlayer();
        startHeartbeat();
        setButtons();
        updateWatermark();
        setStatus('Playback session creada.', 'ok');
        log(data);
      }

      async function heartbeat() {
        if (!state.playbackToken) return;
        const res = await fetch(`${API_BASE}/playback/heartbeat`, {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${state.playbackToken}`,
            'X-Playback-Session-Id': state.sessionId
          }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.details || data.error || 'Heartbeat failed');
        state.playbackToken = data.playbackToken;
      }

      function startHeartbeat() {
        if (state.heartbeatTimer) clearInterval(state.heartbeatTimer);
        state.heartbeatTimer = setInterval(() => {
          heartbeat().catch((error) => setStatus(`Heartbeat rechazado: ${error.message}`, 'bad'));
        }, 20000);
      }

      async function play() {
        await player.unload();
        configurePlayer();
        await player.load(state.manifestUrl);
        setStatus('Widevine reproduciendo con licencia protegida por control-plane.', 'ok');
      }

      async function stopSession() {
        await fetch(`${API_BASE}/playback/stop`, {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${state.playbackToken}`,
            'X-Playback-Session-Id': state.sessionId
          }
        });
        if (state.heartbeatTimer) clearInterval(state.heartbeatTimer);
        await player.unload();
        state.playbackToken = null;
        state.sessionId = null;
        state.manifestUrl = null;
        sessionIdEl.textContent = '-';
        manifestUrlEl.textContent = '-';
        setButtons();
        updateWatermark();
        setStatus('Sesion detenida.', 'warn');
      }

      document.getElementById('btnAllowed').addEventListener('click', () => {
        login('usuario-permitido@tfm.local').catch((error) => setStatus(error.message, 'bad'));
      });
      document.getElementById('btnDenied').addEventListener('click', () => {
        login('usuario-denegado@tfm.local').catch((error) => setStatus(error.message, 'bad'));
      });
      document.getElementById('btnSession').addEventListener('click', () => {
        createSession().catch((error) => setStatus(error.message, 'bad'));
      });
      document.getElementById('btnPlay').addEventListener('click', () => {
        play().catch((error) => setStatus(error.message, 'bad'));
      });
      document.getElementById('btnStop').addEventListener('click', () => {
        stopSession().catch((error) => setStatus(error.message, 'bad'));
      });

      configurePlayer();
      setButtons();
      updateWatermark();
    </script>
  </body>
</html>
